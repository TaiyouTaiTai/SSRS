<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador SSRS - Historial de Firmas</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --silver-light: #E8E8E8;
            --silver-mid: #C0C0C0;
            --silver-dark: #8A8A8A;
            --silver-shine: #F5F5F5;
            --bg-primary: #0A0A0F;
            --bg-secondary: #12121A;
            --bg-card: #1A1A25;
            --accent: #4A6CF7;
            --accent-hover: #5B7BFF;
            --text-primary: #E0E0E8;
            --text-secondary: #8888A0;
            --border: #2A2A3A;
            --error: #FF4D6A;
            --success: #00D48A;
            --warning: #FFB84D;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(74, 108, 247, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 108, 247, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* --- Navbar --- */
        .navbar {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 40px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(12px);
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar-brand {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(
                135deg,
                var(--silver-dark) 0%,
                var(--silver-light) 25%,
                var(--silver-shine) 50%,
                var(--silver-mid) 75%,
                var(--silver-dark) 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: silverShine 4s linear infinite;
        }

        @keyframes silverShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .btn-back {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            border-color: var(--silver-mid);
            color: var(--silver-light);
            background: rgba(192, 192, 192, 0.05);
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--silver-mid);
        }

        .btn-logout {
            padding: 6px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            border-color: var(--error);
            color: var(--error);
        }

        /* --- Main content --- */
        .main-content {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Page header --- */
        .page-header {
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease-out;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 300;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .page-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* --- Buttons --- */
        .btn {
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            padding: 12px 32px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74, 108, 247, 0.25);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* --- Loading state --- */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* --- Empty state --- */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-sub {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        /* --- History content --- */
        #historyContent {
            animation: fadeIn 0.5s ease-out;
        }

        #docCounter {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* --- History cards --- */
        .history-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }

        .history-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74, 108, 247, 0.1);
        }

        .card-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            cursor: pointer;
            user-select: none;
        }

        .card-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
            flex: 1;
            margin-right: 16px;
        }

        .card-filename {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }

        .card-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .card-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(0, 212, 138, 0.1);
            color: var(--success);
        }

        /* --- Card detail --- */
        .card-detail {
            padding: 0 24px 24px;
            border-top: 1px solid var(--border);
            animation: fadeIn 0.3s ease;
        }

        .detail-row {
            margin-top: 16px;
        }

        .detail-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .detail-hash {
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem;
            color: var(--accent);
            word-break: break-all;
            background: var(--bg-primary);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            line-height: 1.6;
        }

        .detail-signature {
            background: #FFFFFF;
            border-radius: 8px;
            padding: 12px;
            display: inline-block;
            border: 1px solid var(--border);
        }

        .detail-signature img {
            max-width: 350px;
            width: 100%;
            display: block;
        }

        .detail-value {
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .detail-id {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-primary);
            word-break: break-all;
        }

        .btn-close-detail {
            margin-top: 20px;
            padding: 8px 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-close-detail:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        /* --- Error box --- */
        .error-box {
            background: rgba(255, 77, 106, 0.1);
            border: 1px solid rgba(255, 77, 106, 0.3);
            border-radius: 8px;
            padding: 16px 20px;
            color: var(--error);
            text-align: center;
            font-size: 0.9rem;
        }

        /* --- Footer --- */
        .panel-footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .panel-footer .mono {
            font-family: 'Space Mono', monospace;
        }

        /* --- Responsive --- */
        @media (max-width: 640px) {
            .navbar {
                padding: 14px 16px;
            }

            .navbar-brand {
                font-size: 0.9rem;
                letter-spacing: 2px;
            }

            .main-content {
                padding: 32px 16px;
            }

            .card-main {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .card-right {
                align-items: flex-start;
            }

            .detail-signature img {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-left">
            <button class="btn-back" id="btnBack">← Volver al panel</button>
            <div class="navbar-brand">Validador SSRS</div>
        </div>
        <div class="navbar-user">
            <div class="user-avatar" id="userAvatar">U</div>
            <span id="userName">—</span>
            <button class="btn-logout" id="btnLogout">Salir</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Page header -->
        <div class="page-header">
            <h1 class="page-title">Historial de Firmas</h1>
            <p class="page-subtitle">Documentos firmados digitalmente en tu cuenta</p>
        </div>

        <!-- Estado: Cargando -->
        <div class="loading-state" id="loadingState">
            <div class="loading-spinner"></div>
            <span class="loading-text">Cargando historial...</span>
        </div>

        <!-- Estado: Sin firmas -->
        <div class="empty-state" id="emptyState">
            <span class="empty-icon">📄</span>
            <h3 class="empty-title">Aún no has firmado documentos</h3>
            <p class="empty-sub">Los documentos que firmes aparecerán aquí</p>
            <button class="btn btn-primary" onclick="window.location.href='/firmar.html'">
                Firmar mi primer documento
            </button>
        </div>

        <!-- Estado: Con historial -->
        <div id="historyContent" style="display: none;">
            <p id="docCounter"></p>
            <div id="historyList"></div>
        </div>

    </div>

    <!-- Footer -->
    <div class="panel-footer">
        <span class="mono">SSRS</span> · Derecho Informático · 2026
    </div>

    <script type="module" src="/src/historial.js"></script>

</body>
</html>
