<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador SSRS - Inicio de Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --silver-light: #E8E8E8;
            --silver-mid: #C0C0C0;
            --silver-dark: #8A8A8A;
            --silver-shine: #F5F5F5;
            --bg-primary: #0A0A0F;
            --bg-secondary: #12121A;
            --bg-card: #1A1A25;
            --accent: #4A6CF7;
            --accent-hover: #5B7BFF;
            --text-primary: #E0E0E8;
            --text-secondary: #8888A0;
            --border: #2A2A3A;
            --error: #FF4D6A;
            --success: #00D48A;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Background animated grid --- */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(74, 108, 247, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 108, 247, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* --- Ambient glow --- */
        body::after {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(74, 108, 247, 0.08) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* --- Main container --- */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 0 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Title --- */
        .title-wrapper {
            text-align: center;
            margin-bottom: 48px;
        }

        .title {
            font-family: 'Space Mono', monospace;
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(
                135deg,
                var(--silver-dark) 0%,
                var(--silver-light) 25%,
                var(--silver-shine) 50%,
                var(--silver-mid) 75%,
                var(--silver-dark) 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: silverShine 4s linear infinite;
            position: relative;
        }

        @keyframes silverShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--silver-mid), transparent);
            margin: 16px auto 0;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- Card --- */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(192, 192, 192, 0.3), transparent);
        }

        /* --- Form elements --- */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1);
        }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            margin-top: 8px;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74, 108, 247, 0.25);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* --- Divider --- */
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            gap: 16px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- Aux button --- */
        .btn-aux {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-aux:hover {
            border-color: var(--silver-mid);
            color: var(--silver-light);
            background: rgba(192, 192, 192, 0.05);
            transform: translateY(-2px);
        }

        .btn-aux:active {
            transform: translateY(0);
        }

        .btn-aux .arrow {
            display: inline-block;
            margin-left: 8px;
            transition: transform 0.3s ease;
        }

        .btn-aux:hover .arrow {
            transform: translateX(4px);
        }

        /* --- Footer note --- */
        .footer-note {
            text-align: center;
            margin-top: 32px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .footer-note .mono {
            font-family: 'Space Mono', monospace;
            color: var(--silver-dark);
        }

        /* --- Status indicator --- */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* --- Toggle mode button --- */
        .toggle-mode {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--accent);
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Outfit', sans-serif;
            width: 100%;
        }

        .toggle-mode:hover {
            text-decoration: underline;
        }

        /* --- Error message --- */
        .error-message {
            display: none;
            background: rgba(255, 77, 106, 0.1);
            border: 1px solid rgba(255, 77, 106, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--error);
            text-align: center;
        }

        /* --- Responsive --- */
        @media (max-width: 480px) {
            .title {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }

            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">

        <!-- Title -->
        <div class="title-wrapper">
            <h1 class="title">Validador SSRS</h1>
            <p class="subtitle">Sistema de firma digital</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">

            <div class="status-bar">
                <span class="status-dot"></span>
                <span>Sistema activo</span>
            </div>

            <h2 class="form-title" id="formTitle">Iniciar sesión</h2>

            <div class="error-message" id="errorMessage"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Correo electrónico</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="usuario@universidad.edu"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="••••••••"
                    >
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-primary">
                    Iniciar Sesión
                </button>
            </form>

            <button class="toggle-mode" id="btnToggleMode">¿No tienes cuenta? Regístrate</button>

            <!-- Divider -->
            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">o bien</span>
                <div class="divider-line"></div>
            </div>

            <!-- Aux Button -->
            <button id="btnAux" class="btn btn-aux">
                Acceder al panel sin cuenta <span class="arrow">→</span>
            </button>

        </div>

        <!-- Footer -->
        <p class="footer-note">
            <span class="mono">SSRS</span> · Derecho Informático · 2026
        </p>

    </div>

    <script type="module" src="/src/login.js"></script>

</body>
</html>
